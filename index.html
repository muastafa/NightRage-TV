<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NightRage TV</title>

<script src="playerjs.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#000 url("https://e.top4top.io/p_38229y3981.jpg") center/cover fixed;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
z-index:-1;
}

.header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
display:flex;
gap:12px;
align-items:center;
}

.brand img{
width:45px;
height:45px;
border-radius:50%;
}

.brand span{
color:white;
font-size:28px;
font-weight:900;
}

.telegram-btn{
width:45px;
height:45px;
display:flex;
justify-content:center;
align-items:center;
background:#1b1b1b;
border-radius:50%;
}

.telegram-btn img{
width:25px;
}

.packages{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

.package-card{
background:rgba(255,255,255,.08);
border-radius:20px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.package-card:hover{
transform:scale(1.05);
}

.package-card img{
width:100%;
}

.package-card h4{
color:white;
font-size:13px;
text-align:center;
}

#playerBox{
display:none;
position:fixed;
inset:0;
background:black;
z-index:99999;
padding:10px;
overflow:auto;
}

#channelName{
color:white;
text-align:center;
}

#serverSelect{
width:100%;
height:45px;
background:#111;
color:white;
border:none;
border-radius:12px;
margin:10px 0;
}

.closeBtn{
width:100%;
height:50px;
background:red;
color:white;
border:none;
border-radius:15px;
font-size:18px;
}

#player{
width:100%;
height:500px;
}

@media(max-width:700px){

.packages{
grid-template-columns:repeat(2,1fr);
}

#player{
height:250px;
}

}

</style>

</head>

<body>

<div class="header">

<a href="go:tlk" class="telegram-btn">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
</a>

<div class="brand">
<img src="https://c.top4top.io/p_3814jvtce1.jpg">
<span>NightRage TV</span>
</div>

</div>

<div class="packages">

<div class="package-card"
onclick="openChannel(
'Bein Max1',
'http://xlion.net:8080/live/4750034742512197/3177932697568638/460862.ts',
'http://xlion.net:8080/live/4750034742512197/3177932697568638/460863.ts',
'https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8',
'http://xlion.net:8080/live/4750034742512197/3177932697568638/460861.ts'
)">
<img src="https://h.top4top.io/p_3822tssjh1.jpg">
<h4>Bein Max1</h4>
</div>

</div>

<div id="playerBox">

<h2 id="channelName"></h2>

<select id="serverSelect">

<option value="0">Server 1</option>
<option value="1">Server 2</option>
<option value="2">Server 3</option>
<option value="3">Server 4</option>

</select>

<div id="player"></div>

<button class="closeBtn"
onclick="closePlayer()">
إغلاق المشغل
</button>

</div>

<script>

let servers=[];
let player;

function loadVideo(url){

document.getElementById("player").innerHTML="";

player=new Playerjs({
id:"player",
file:url,
autoplay:1
});

}

function openChannel(name,s1,s2,s3,s4){

document.getElementById("playerBox").style.display="block";

document.getElementById("channelName").innerHTML=name;

servers=[s1,s2,s3,s4];

loadVideo(s1);

}

document.getElementById("serverSelect").addEventListener("change",function(){

loadVideo(servers[this.value]);

});

function closePlayer(){

document.getElementById("playerBox").style.display="none";

document.getElementById("player").innerHTML="";

}

</script>

</body>
</html>
